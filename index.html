        /* Стили для кнопок */

            text-align: center;

        .main-button:hover {
            background-color: #0056b3;
        }

    <!-- Контейнер для кнопок -->
    <div class="button-container">
        <!-- Кнопка "Новости" -->

        </a>

        </a>
        
        <!-- Кнопка "Защита сервера" -->
